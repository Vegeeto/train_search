name: 'train_search'

services:
  app:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ../:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev

volumes:
  node_modules:
